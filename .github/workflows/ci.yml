name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: fmt
        run: |
          UNFORMATTED=$(find . -name "*.go" -not -path "./.git/*" | xargs gofmt -l)
          if [ -n "$UNFORMATTED" ]; then
            echo "Unformatted files:"
            echo "$UNFORMATTED"
            exit 1
          fi

      - name: lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

      - name: test
        run: go test -race ./... -coverprofile=coverage.out -covermode=atomic

      - name: coverage gate
        run: |
          FUNC=$(go tool cover -func=coverage.out)
          TOTAL=$(echo "$FUNC" | awk '/^total:/ {gsub(/%/,"",$NF); print $NF}')
          SYNC=$(awk '
            /^mode:/ { next }
            $1 ~ /\/internal\/sync\// {
              total += $2
              if ($3 > 0) covered += $2
            }
            END {
              if (total == 0) {
                print "ERROR: no statement data for internal/sync/" > "/dev/stderr"
                exit 1
              }
              printf "%.1f", covered * 100 / total
            }
          ' coverage.out)
          echo "Total statement coverage:         ${TOTAL}%"
          echo "internal/sync statement coverage: ${SYNC}%"
          FAIL=0
          awk "BEGIN { exit !($TOTAL < 80) }" && { echo "FAIL: total ${TOTAL}% < 80%" >&2; FAIL=1; }
          awk "BEGIN { exit !($SYNC  < 80) }" && { echo "FAIL: internal/sync ${SYNC}% < 80%" >&2; FAIL=1; }
          exit $FAIL

      - name: build
        run: go build ./...
